{% for item in postListItems %}
<article class="item-post">
<small class="item-meta">{{ item.data.postAuthor }} • {{ (item.data.date or item.date) | dateFilter }}</small>

<h3 data-size="l"><a href="{{ item.url }}">{{ item.data.title }}</a></h3>

<p>{{ item.data.postSummary }}</p>
</article>
{% endfor %}
