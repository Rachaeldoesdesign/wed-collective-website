backend:
  name: git-gateway
  branch: main
publish_mode: editorial_workflow
media_folder: src/images
public_folder: /images
collections:
  - name: pages
    label: Pages
    files:
      - label: Homepage
        name: home
        file: src/index.md
        fields:
          - label: Layout
            name: layout
            widget: hidden
            default: layouts/home.html
          - label: Title
            name: title
            widget: string
          - label: Meta description
            name: metaDesc
            widget: text
            required: false
          - label: Feature image
            name: featureImage
            widget: image
            required: false
          - label: Feature image caption
            name: featureImageCaption
            widget: string
            required: false
          - label: Intro
            name: lede
            widget: markdown
            required: false
          - label: Sidebar
            name: aside
            widget: markdown
            required: false
          - label: Planning section
            name: planning
            widget: markdown
            required: false
          - label: Clarity section
            name: clarity
            widget: markdown
            required: false
          - label: Clarity image one URL
            name: clarityImageOne
            widget: string
            required: false
          - label: Clarity image two URL
            name: clarityImageTwo
            widget: string
            required: false
          - label: Clarity image three URL
            name: clarityImageThree
            widget: string
            required: false
          - label: Body
            name: body
            widget: markdown
            required: false
      - label: About
        name: about
        file: src/why-us.md
        fields:
          - label: Layout
            name: layout
            widget: hidden
            default: layouts/why-us.html
          - label: Permalink
            name: permalink
            widget: hidden
            default: /why-us/
          - label: Title
            name: title
            widget: string
          - label: Meta description
            name: metaDesc
            widget: text
            required: false
          - label: Feature image
            name: featureImage
            widget: image
            required: false
          - label: Feature image caption
            name: featureImageCaption
            widget: string
            required: false
          - label: Intro
            name: lede
            widget: markdown
            required: false
          - label: Introduction
            name: introduction
            widget: markdown
            required: false
          - label: Quote
            name: quote
            widget: markdown
            required: false
          - label: Citation
            name: citation
            widget: string
            required: false
          - label: Point one
            name: pointOne
            widget: markdown
            required: false
          - label: Point two
            name: pointTwo
            widget: markdown
            required: false
          - label: Point three
            name: pointThree
            widget: markdown
            required: false
          - label: Point four
            name: pointFour
            widget: markdown
            required: false
          - label: Stats one
            name: statsOne
            widget: markdown
            required: false
          - label: Stats two
            name: statsTwo
            widget: markdown
            required: false
          - label: Stats three
            name: statsThree
            widget: markdown
            required: false
          - label: Stats four
            name: statsFour
            widget: markdown
            required: false
          - label: Stats five
            name: statsFive
            widget: markdown
            required: false
          - label: CTA title
            name: ctaTitle
            widget: string
            required: false
          - label: CTA description
            name: ctaDescription
            widget: text
            required: false
          - label: Body
            name: body
            widget: markdown
            required: false
      - label: Contact
        name: contact
        file: src/contact.md
        fields:
          - label: Layout
            name: layout
            widget: hidden
            default: layouts/contact.html
          - label: Permalink
            name: permalink
            widget: hidden
            default: /contact/
          - label: Title
            name: title
            widget: string
          - label: Meta description
            name: metaDesc
            widget: text
            required: false
          - label: Feature image
            name: featureImage
            widget: image
            required: false
          - label: Feature image caption
            name: featureImageCaption
            widget: string
            required: false
          - label: Intro
            name: lede
            widget: markdown
            required: false
          - label: Sidebar
            name: aside
            widget: markdown
            required: false
          - label: Body
            name: body
            widget: markdown
            required: false
      - label: Privacy policy
        name: privacy
        file: src/privacy.md
        fields:
          - label: Layout
            name: layout
            widget: hidden
            default: layouts/page.html
          - label: Permalink
            name: permalink
            widget: hidden
            default: /privacy/
          - label: Title
            name: title
            widget: string
          - label: Body
            name: body
            widget: markdown
      - label: Terms
        name: terms
        file: src/terms.md
        fields:
          - label: Layout
            name: layout
            widget: hidden
            default: layouts/page.html
          - label: Permalink
            name: permalink
            widget: hidden
            default: /terms/
          - label: Title
            name: title
            widget: string
          - label: Body
            name: body
            widget: markdown
      - label: Blog index
        name: blog
        file: src/blog.md
        fields:
          - label: Layout
            name: layout
            widget: hidden
            default: layouts/feed.html
          - label: Title
            name: title
            widget: string
          - label: Meta description
            name: metaDesc
            widget: text
            required: false
          - label: Intro
            name: lede
            widget: markdown
            required: false
      - label: Case studies
        name: case_studies
        file: src/case-studies.md
        fields:
          - label: Layout
            name: layout
            widget: hidden
            default: layouts/case-studies.html
          - label: Permalink
            name: permalink
            widget: hidden
            default: /case-studies/
          - label: Title
            name: title
            widget: string
            default: Case studies
          - label: Meta description
            name: metaDesc
            widget: text
            required: false
          - label: Lede
            name: lede
            widget: markdown
            required: false
      - label: FAQs
        name: faqs
        file: src/faqs.md
        fields:
          - label: Layout
            name: layout
            widget: hidden
            default: layouts/faqs.html
          - label: Permalink
            name: permalink
            widget: hidden
            default: /faqs/
          - label: Title
            name: title
            widget: string
            default: Frequently asked questions
          - label: Meta description
            name: metaDesc
            widget: text
            required: false
          - label: Lede
            name: lede
            widget: markdown
            required: false
      - label: Services
        name: services
        file: src/services.md
        fields:
          - label: Layout
            name: layout
            widget: hidden
            default: layouts/services.html
          - label: Permalink
            name: permalink
            widget: hidden
            default: /services/
          - label: Title
            name: title
            widget: string
            default: Services
          - label: Meta description
            name: metaDesc
            widget: text
            required: false
          - label: Lede
            name: lede
            widget: markdown
            required: false
  - name: globals
    label: Globals
    files:
      - label: Main navigation
        name: navigation
        file: src/_data/navigation.json
        fields:
          - label: Items
            name: items
            widget: list
            fields:
              - label: Text
                name: text
                widget: string
              - label: URL
                name: url
                widget: string
      - label: Footer navigation
        name: footer_navigation
        file: src/_data/footer_navigation.json
        fields:
          - label: Items
            name: items
            widget: list
            fields:
              - label: Text
                name: text
                widget: string
              - label: URL
                name: url
                widget: string
  - name: posts
    label: Posts
    folder: src/posts
    create: true
    slug: '{{slug}}'
    preview_path: blog/{{slug}}
    fields:
      - label: Title
        name: title
        widget: string
      - label: Publish date
        name: date
        widget: datetime
      - label: Author
        name: postAuthor
        widget: string
      - label: Summary
        name: postSummary
        widget: text
      - label: Categories
        name: postCategories
        widget: list
        allow_add: true
      - label: Tags
        name: postTags
        widget: list
        allow_add: true
      - label: Body
        name: body
        widget: markdown
  - name: case_studies
    label: Case studies
    folder: src/case-studies
    create: true
    slug: '{{slug}}'
    preview_path: case-studies/{{slug}}
    fields:
      - label: Title
        name: title
        widget: string
      - label: Client name
        name: clientName
        widget: string
      - label: Client logo
        name: clientLogo
        widget: image
        required: false
      - label: Categories
        name: categories
        widget: list
        required: false
        field:
          label: Category
          name: category
          widget: string
      - label: Deliverables
        name: deliverables
        widget: list
        required: false
        field:
          label: Deliverable
          name: deliverable
          widget: string
      - label: Image
        name: img
        widget: image
        required: false
      - label: Thumbnail image
        name: imgThumbnail
        widget: image
        required: false
      - label: Lede
        name: lede
        widget: text
      - label: Meta description
        name: metaDesc
        widget: text
        required: false
      - label: Outcomes
        name: outcomes
        widget: list
        required: false
        field:
          label: Outcome
          name: outcome
          widget: string
      - label: Quotation
        name: quotation
        widget: text
        required: false
      - label: Order
        name: order
        widget: number
        value_type: int
        min: 1
        required: false
      - label: Featured
        name: featured
        widget: boolean
        required: false
        default: false
      - label: Slug
        name: slug
        widget: string
        required: false
      - label: Year
        name: year
        widget: number
        value_type: int
        required: false
      - label: Project URL
        name: projectUrl
        widget: string
        required: false
      - label: Body
        name: body
        widget: markdown
        required: false
  - name: faqs
    label: FAQs
    folder: src/faqs
    create: true
    slug: '{{slug}}'
    preview_path: faqs
    fields:
      - label: Question
        name: question
        widget: string
      - label: Answer
        name: answer
        widget: markdown
      - label: Category
        name: category
        widget: string
      - label: Order
        name: order
        widget: number
        value_type: int
        min: 1
  - name: services
    label: Services
    folder: src/services
    create: true
    slug: '{{slug}}'
    preview_path: services/{{slug}}
    fields:
      - label: Title
        name: title
        widget: string
      - label: Lede
        name: lede
        widget: text
      - label: Summary
        name: summary
        widget: text
        required: false
      - label: Meta description
        name: metaDesc
        widget: text
        required: false
      - label: Image
        name: img
        widget: image
        required: false
      - label: Thumbnail image
        name: imgThumbnail
        widget: image
        required: false
      - label: Quotation
        name: quotation
        widget: text
        required: false
      - label: Order
        name: order
        widget: number
        value_type: int
        min: 1
        required: false
      - label: Featured
        name: featured
        widget: boolean
        required: false
        default: false
      - label: Slug
        name: slug
        widget: string
        required: false
      - label: CTA text
        name: ctaText
        widget: string
        required: false
      - label: CTA URL
        name: ctaUrl
        widget: string
        required: false
      - label: Body
        name: body
        widget: markdown
        required: false
